<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#080d1d" />
<title>피구 작전판</title>
<style>
  :root {
    --bg: #080d1d;
    --panel: rgba(255, 255, 255, 0.95);
    --panel-line: rgba(12, 20, 44, 0.16);
    --text: #141927;
    --muted: #687086;
    --own: #020715;
    --own-2: #0a1534;
    --enemy: #078537;
    --enemy-2: #045b27;
    --chip: clamp(46px, 3.65vw, 66px);
    --radius: 22px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at top left, #1d2744 0%, #080d1d 52%, #050813 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
  }
  body { touch-action: manipulation; }
  button { font: inherit; }

  .app {
    height: 100dvh;
    width: 100vw;
    display: grid;
    grid-template-columns: minmax(292px, 22.5vw) minmax(0, 1fr);
    gap: 14px;
    padding: 14px;
  }

  .panel {
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: var(--radius);
    background: var(--panel);
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    backdrop-filter: blur(12px);
  }

  .title-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  h1 {
    margin: 0;
    font-size: clamp(20px, 2vw, 28px);
    letter-spacing: -0.04em;
    line-height: 1.08;
  }
  .subtitle {
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.32;
  }
  .count-pill {
    flex: 0 0 auto;
    min-width: 74px;
    padding: 8px 10px;
    border-radius: 999px;
    text-align: center;
    color: #fff;
    background: #11182e;
    font-weight: 900;
    letter-spacing: -0.02em;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.16);
  }

  .toolbar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .tool-btn, .mode-btn {
    min-height: 42px;
    border: 0;
    border-radius: 13px;
    padding: 9px 10px;
    color: #11182e;
    background: #eef1f7;
    font-weight: 900;
    cursor: pointer;
    box-shadow: inset 0 0 0 1px var(--panel-line);
    white-space: nowrap;
  }
  .tool-btn:active, .mode-btn:active { transform: translateY(1px); }
  .tool-btn.primary, .mode-btn.primary { color: #fff; background: #11182e; }
  .tool-btn.green, .mode-btn.green { color: #fff; background: #087d38; }
  .tool-btn.danger { color: #fff; background: #7f2032; }
  .mode-btn.ghost { color: #fff; background: rgba(255,255,255,.16); box-shadow: inset 0 0 0 1px rgba(255,255,255,.18); }

  .mode-bar {
    position: fixed;
    left: 50%;
    top: max(10px, env(safe-area-inset-top));
    transform: translateX(-50%);
    z-index: 9000;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 8px;
    border-radius: 999px;
    background: rgba(5, 8, 19, .70);
    box-shadow: 0 12px 30px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,255,255,.16);
    backdrop-filter: blur(12px);
  }
  .mode-bar .mode-btn { min-height: 40px; padding: 8px 13px; border-radius: 999px; font-size: 14px; }

  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 2px;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: -0.03em;
  }
  .section-title small { color: var(--muted); font-weight: 700; white-space: nowrap; }

  .roster {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    max-height: 32dvh;
    overflow: auto;
    padding-right: 2px;
    scrollbar-width: thin;
  }
  .name-btn {
    min-height: 44px;
    border: 0;
    border-radius: 14px;
    padding: 9px 8px;
    color: #192034;
    background: #f7f4ee;
    font-weight: 900;
    letter-spacing: -0.04em;
    cursor: pointer;
    box-shadow: inset 0 0 0 1px rgba(17, 24, 46, 0.12), 0 3px 9px rgba(0,0,0,.05);
  }
  .name-btn.selected {
    color: #fff;
    background: linear-gradient(180deg, #17213f 0%, #020715 100%);
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.78), 0 5px 14px rgba(2, 7, 21, .22);
  }
  .name-btn:disabled { opacity: 0.38; cursor: not-allowed; }

  .bench-wrap {
    min-height: 0;
    display: grid;
    grid-template-rows: minmax(92px, auto) minmax(92px, auto);
    gap: 10px;
    overflow: auto;
    padding-right: 2px;
  }
  .bench {
    min-height: 92px;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 11px 10px;
    padding: 12px;
    border-radius: 18px;
    background: rgba(12, 20, 44, 0.06);
    box-shadow: inset 0 0 0 1px rgba(12, 20, 44, 0.10);
  }
  .empty-note {
    width: 100%;
    align-self: center;
    color: #778097;
    font-size: 13px;
    line-height: 1.35;
    padding: 6px;
  }

  .board-shell {
    position: relative;
    min-width: 0;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .court-frame {
    position: relative;
    width: 100%;
    max-height: calc(100dvh - 28px);

    background-position: center;
    background-size: 100% 100%;
    background-repeat: no-repeat;
    box-shadow: 0 22px 60px rgba(0,0,0,.34), inset 0 0 0 1px rgba(255,255,255,.3);
  }
  .court-frame::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.35), inset 0 0 60px rgba(255,255,255,.10);
    z-index: 4;
  }
  .court-lines, .trail-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
  }
  .court-lines { z-index: 0; }
  .trail-layer { z-index: 1; }
  .board-layer {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .piece {
    width: var(--chip);
    height: var(--chip);
    position: relative;
    flex: 0 0 auto;
    touch-action: none;
    cursor: grab;
    pointer-events: auto;
    transform-origin: center center;
  }
  .bench .piece { margin-bottom: 22px; }
  .board-layer .piece { position: absolute; transform: translate(-50%, -50%); }
  .piece:active { cursor: grabbing; }
  .disc {
    width: var(--chip);
    height: var(--chip);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 1000;
    font-size: calc(var(--chip) * 0.45);
    line-height: 1;
    letter-spacing: -0.04em;
    border: 2px solid rgba(255,255,255,.84);
    box-shadow: 0 7px 14px rgba(0,0,0,.32), inset 0 1px 4px rgba(255,255,255,.25), inset 0 -6px 12px rgba(0,0,0,.22);
  }
  .own .disc { background: radial-gradient(circle at 30% 20%, #1c2748 0%, var(--own-2) 38%, var(--own) 80%); }
  .enemy .disc { background: radial-gradient(circle at 30% 20%, #37c96d 0%, var(--enemy) 42%, var(--enemy-2) 82%); }
  .piece-name {
    position: absolute;
    top: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    max-width: calc(var(--chip) * 1.85);
    min-width: calc(var(--chip) * 1.15);
    padding: 3px 7px 4px;
    border-radius: 999px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #11182e;
    background: rgba(255,255,255,.94);
    font-size: clamp(10px, 1vw, 13px);
    font-weight: 900;
    letter-spacing: -0.05em;
    box-shadow: 0 4px 9px rgba(0,0,0,.17), inset 0 0 0 1px rgba(17,24,46,.08);
    pointer-events: none;
  }
  .dragging {
    position: fixed !important;
    transform: none !important;
    z-index: 9999 !important;
    pointer-events: none !important;
    filter: drop-shadow(0 18px 18px rgba(0,0,0,.34));
    cursor: grabbing;
  }
  .trail-seg {
    stroke-width: 12;
    stroke-linecap: round;
    opacity: 0.72;
    fill: none;
    animation: fadeTrail 1s ease-out forwards;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,.20));
  }
  .trail-own { stroke: rgba(2, 7, 21, .66); }
  .trail-enemy { stroke: rgba(7, 133, 55, .66); }
  @keyframes fadeTrail { 0% { opacity: .70; } 68% { opacity: .32; } 100% { opacity: 0; } }
  .court-hint {
    position: absolute;
    left: 16px;
    bottom: 14px;
    z-index: 3;
    padding: 8px 11px;
    border-radius: 999px;
    color: rgba(255,255,255,.96);
    background: rgba(2,7,21,.64);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: -0.02em;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%) translateY(30px);
    z-index: 10000;
    padding: 12px 16px;
    border-radius: 999px;
    color: #fff;
    background: rgba(5, 8, 19, .90);
    box-shadow: 0 14px 34px rgba(0,0,0,.35);
    opacity: 0;
    transition: opacity .18s ease, transform .18s ease;
    pointer-events: none;
    font-weight: 850;
    letter-spacing: -0.03em;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .panel-collapsed .panel { display: none; }
  .panel-collapsed.app { grid-template-columns: 1fr; padding: 8px; }
  .panel-collapsed .court-frame { max-height: calc(100dvh - 16px); border-radius: 16px; }

  @media (max-width: 980px) {
    :root { --chip: clamp(42px, 5.1vw, 62px); }
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: minmax(0, 1fr) auto;
      padding: 10px;
      gap: 10px;
    }
    .panel { order: 2; max-height: 40dvh; padding: 12px; gap: 9px; }
    .board-shell { order: 1; }
    .court-frame { max-height: 58dvh; border-radius: 18px; }
    .panel-collapsed .court-frame { max-height: calc(100dvh - 16px); }
    .roster { max-height: 13dvh; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .bench-wrap { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
    .toolbar { grid-template-columns: repeat(3, 1fr); }
    .tool-btn { font-size: 12px; padding: 7px 6px; }
    .mode-bar { max-width: calc(100vw - 18px); border-radius: 22px; }
    .mode-bar .mode-btn { font-size: 12px; min-height: 36px; padding: 7px 10px; }
    .court-hint { font-size: 11px; left: 8px; bottom: 8px; }
  }
</style>
</head>
<body>
  <div class="mode-bar" aria-label="작전 모드 버튼">
    <button class="mode-btn primary" id="lineupBtnTop" type="button">출전</button>
    <button class="mode-btn" id="attackBtnTop" type="button">공격모드</button>
    <button class="mode-btn green" id="defenseBtnTop" type="button">수비모드</button>
    <button class="mode-btn ghost" id="panelToggleBtn" type="button">선수선택</button>
    <button class="mode-btn ghost" id="fullscreenBtnTop" type="button">전체화면</button>
  </div>

  <div class="app panel-collapsed" id="app">
    <aside class="panel" id="panel">
      <div class="title-row">
        <div>
          <h1>피구 작전판</h1>
          <div class="subtitle">명단에서 최대 12명을 고른 뒤 출전·공격·수비 버튼으로 바로 배치하세요.</div>
        </div>
        <div class="count-pill"><span id="selectedCount">0</span>/12</div>
      </div>

      <div class="toolbar">
        <button class="tool-btn primary" id="lineupBtn" type="button">출전</button>
        <button class="tool-btn" id="attackBtn" type="button">공격모드</button>
        <button class="tool-btn green" id="defenseBtn" type="button">수비모드</button>
        <button class="tool-btn" id="defaultBtn" type="button">기본 12명</button>
        <button class="tool-btn" id="resetPosBtn" type="button">위치 초기화</button>
        <button class="tool-btn danger" id="clearBtn" type="button">선택 해제</button>
      </div>

      <div class="section-title">
        <span>선수 명단</span>
        <small>김나현 삭제 · 선택순 1–12번</small>
      </div>
      <div class="roster" id="roster"></div>

      <div class="section-title">
        <span>말판 대기석</span>
        <small>코트 밖으로 놓으면 대기석 복귀</small>
      </div>
      <div class="bench-wrap">
        <div>
          <div class="section-title" style="margin-bottom:6px;"><span>우리팀</span><small>진한 곤색</small></div>
          <div class="bench" id="ownBench"></div>
        </div>
        <div>
          <div class="section-title" style="margin-bottom:6px;"><span>상대편</span><small>초록색 1–12번</small></div>
          <div class="bench" id="enemyBench"></div>
        </div>
      </div>
    </aside>

    <main class="board-shell">
      <div class="court-frame" id="court" aria-label="피구 코트">
        <svg class="court-lines" viewBox="0 0 1822 1173" preserveAspectRatio="none" aria-hidden="true">
          <g fill="none" stroke="#fff" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter">
            <rect x="28" y="28" width="1766" height="1117" />
            <path d="M568 28V229 M1248 28V229 M568 939V1145 M1248 939V1145" />
            <path d="M229 229H1597 M229 939H1597 M229 229V939 M911 229V939 M1597 229V939" />
            <circle cx="911" cy="586" r="129" />
          </g>
        </svg>
        <svg class="trail-layer" id="trailLayer" viewBox="0 0 1822 1173" preserveAspectRatio="none"></svg>
        <div class="board-layer" id="boardLayer"></div>
        <div class="court-hint">터치로 드래그 · 이동 잔상 1초</div>
      </div>
    </main>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(() => {
  "use strict";

  const ROSTER = ["강수민", "박세인", "김보민", "문가령", "박서빈", "한서윤", "박민주", "이서현", "박시연", "김송이", "유아인", "김담희", "이소미", "한아린", "김리안", "안지우"];
  const DEFAULT_SELECTED = ["박세인", "김송이", "유아인", "이소미", "김리안", "안지우", "한아린", "김담희", "박시연", "박서빈", "김보민", "한서윤"];
  const MAX_PLAYERS = 12;
  const STORAGE_KEY = "dodgeball-board-v3-clean-mode";
  const COURT_W = 1822;
  const COURT_H = 1173;

  const LINEUP_OWN = {
    1:{x:24, y:27}, 2:{x:34, y:27}, 3:{x:44, y:27},
    4:{x:24, y:43}, 5:{x:34, y:43}, 6:{x:44, y:43},
    7:{x:24, y:59}, 8:{x:34, y:59}, 9:{x:44, y:59},
    10:{x:24, y:75}, 11:{x:34, y:75}, 12:{x:44, y:75}
  };
  const LINEUP_ENEMY = {
    1:{x:57, y:27}, 2:{x:67, y:27}, 3:{x:77, y:27},
    4:{x:57, y:43}, 5:{x:67, y:43}, 6:{x:77, y:43},
    7:{x:57, y:59}, 8:{x:67, y:59}, 9:{x:77, y:59},
    10:{x:57, y:75}, 11:{x:67, y:75}, 12:{x:77, y:75}
  };
  const ATTACK_OWN = {
    1:{x:35.575,y:74.532}, 2:{x:93.326,y:50.366}, 3:{x:38.833,y:53.784}, 4:{x:19.233,y:48.739},
    5:{x:36.364,y:25.956}, 6:{x:42.302,y:47.600}, 7:{x:28.954,y:69.081}, 8:{x:25.906,y:37.510},
    9:{x:42.091,y:75.753}, 10:{x:43.248,y:22.783}, 11:{x:31.056,y:31.652}, 12:{x:24.698,y:59.642}
  };
  const ATTACK_ENEMY = {
    1:{x:73.936,y:50.448}, 2:{x:73.621,y:44.589}, 3:{x:72.097,y:32.628}, 4:{x:71.519,y:27.177},
    5:{x:70.468,y:21.969}, 6:{x:73.516,y:55.655}, 7:{x:73.410,y:61.920}, 8:{x:72.780,y:67.372},
    9:{x:71.729,y:72.986}, 10:{x:70.993,y:77.950}, 11:{x:72.990,y:38.893}, 12:{x:5.938,y:50.773}
  };
  const DEFENSE_OWN = {
    1:{x:29.676,y:73.350}, 2:{x:93.156,y:50.448}, 3:{x:27.273,y:53.545}, 4:{x:28.579,y:42.543},
    5:{x:31.139,y:25.265}, 6:{x:27.847,y:45.966}, 7:{x:28.631,y:67.808}, 8:{x:28.840,y:35.289},
    9:{x:31.557,y:77.995}, 10:{x:32.497,y:20.782}, 11:{x:30.199,y:30.481}, 12:{x:28.265,y:60.310}
  };
  const DEFENSE_ENEMY = {
    1:{x:63.062,y:51.834}, 2:{x:60.502,y:46.210}, 3:{x:75.444,y:33.578}, 4:{x:67.137,y:27.954},
    5:{x:64.368,y:21.108}, 6:{x:69.645,y:57.050}, 7:{x:80.251,y:52.975}, 8:{x:72.675,y:66.585},
    9:{x:70.376,y:73.187}, 10:{x:64.890,y:78.077}, 11:{x:72.936,y:38.957}, 12:{x:6.270,y:50.856}
  };

  const app = document.getElementById("app");
  const rosterEl = document.getElementById("roster");
  const ownBench = document.getElementById("ownBench");
  const enemyBench = document.getElementById("enemyBench");
  const boardLayer = document.getElementById("boardLayer");
  const court = document.getElementById("court");
  const trailLayer = document.getElementById("trailLayer");
  const selectedCount = document.getElementById("selectedCount");
  const toast = document.getElementById("toast");
  const panelToggleBtn = document.getElementById("panelToggleBtn");

  let state = loadState();
  let toastTimer = null;
  let drag = null;

  function getEnemyKey(number) { return `enemy-${number}`; }

  function buildPositionState(selected, ownMap, enemyMap) {
    const ownPositions = {};
    selected.slice(0, MAX_PLAYERS).forEach((name, idx) => {
      const p = ownMap[idx + 1];
      if (p) ownPositions[name] = { inBoard: true, x: p.x, y: p.y };
    });
    const enemyPositions = {};
    for (let i = 1; i <= MAX_PLAYERS; i += 1) {
      const p = enemyMap[i];
      if (p) enemyPositions[getEnemyKey(i)] = { inBoard: true, x: p.x, y: p.y };
    }
    return { selected: selected.slice(0, MAX_PLAYERS), ownPositions, enemyPositions };
  }

  function getDefaultState() {
    return buildPositionState(DEFAULT_SELECTED, ATTACK_OWN, ATTACK_ENEMY);
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return getDefaultState();
      const parsed = JSON.parse(raw);
      const selected = Array.isArray(parsed.selected)
        ? parsed.selected.filter((name, idx, arr) => ROSTER.includes(name) && arr.indexOf(name) === idx).slice(0, MAX_PLAYERS)
        : [];
      return {
        selected,
        ownPositions: parsed.ownPositions && typeof parsed.ownPositions === "object" ? parsed.ownPositions : {},
        enemyPositions: parsed.enemyPositions && typeof parsed.enemyPositions === "object" ? parsed.enemyPositions : {}
      };
    } catch (err) {
      return getDefaultState();
    }
  }

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch (err) { /* 저장 공간이 막혀 있어도 작전판은 계속 동작합니다. */ }
  }

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 1600);
  }

  function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
  function escapeText(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function getPosition(team, key) {
    const store = team === "own" ? state.ownPositions : state.enemyPositions;
    const pos = store[key];
    if (!pos || pos.inBoard !== true) return { inBoard: false };
    const x = Number(pos.x);
    const y = Number(pos.y);
    if (!Number.isFinite(x) || !Number.isFinite(y)) return { inBoard: false };
    return { inBoard: true, x: clamp(x, 2, 98), y: clamp(y, 3, 97) };
  }

  function setPosition(team, key, pos) {
    const store = team === "own" ? state.ownPositions : state.enemyPositions;
    store[key] = pos;
    saveState();
  }

  function renderRoster() {
    rosterEl.innerHTML = "";
    const selectedSet = new Set(state.selected);
    const maxed = state.selected.length >= MAX_PLAYERS;

    ROSTER.forEach((name) => {
      const btn = document.createElement("button");
      const order = state.selected.indexOf(name);
      btn.type = "button";
      btn.className = "name-btn" + (selectedSet.has(name) ? " selected" : "");
      btn.textContent = order >= 0 ? `${order + 1}. ${name}` : name;
      btn.disabled = maxed && !selectedSet.has(name);
      btn.addEventListener("click", () => togglePlayer(name));
      rosterEl.appendChild(btn);
    });

    selectedCount.textContent = String(state.selected.length);
  }

  function togglePlayer(name) {
    const index = state.selected.indexOf(name);
    if (index >= 0) {
      state.selected.splice(index, 1);
      delete state.ownPositions[name];
    } else {
      if (state.selected.length >= MAX_PLAYERS) {
        showToast("선수는 최대 12명까지 선택할 수 있어요.");
        return;
      }
      state.selected.push(name);
    }
    saveState();
    renderAll();
  }

  function createPiece({ team, key, number, name, onBoard }) {
    const piece = document.createElement("div");
    piece.className = `piece ${team}${onBoard ? " on-board" : ""}`;
    piece.dataset.team = team;
    piece.dataset.key = key;
    piece.dataset.number = String(number);
    piece.setAttribute("role", "button");
    piece.setAttribute("tabindex", "0");
    piece.setAttribute("aria-label", team === "own" ? `${number}번 ${name}` : `상대편 ${number}번`);
    const label = team === "own" ? `<div class="piece-name">${escapeText(name)}</div>` : "";
    piece.innerHTML = `<div class="disc">${number}</div>${label}`;
    piece.addEventListener("pointerdown", onPointerDown);
    return piece;
  }

  function renderBenches() {
    ownBench.innerHTML = "";
    enemyBench.innerHTML = "";

    let ownWaiting = 0;
    state.selected.forEach((name, idx) => {
      const pos = getPosition("own", name);
      if (!pos.inBoard) {
        ownBench.appendChild(createPiece({ team: "own", key: name, number: idx + 1, name, onBoard: false }));
        ownWaiting += 1;
      }
    });

    if (state.selected.length === 0) {
      ownBench.innerHTML = `<div class="empty-note">선수 명단에서 사용할 12명을 선택하세요.</div>`;
    } else if (ownWaiting === 0) {
      ownBench.innerHTML = `<div class="empty-note">우리팀 말판이 모두 코트 위에 있습니다.</div>`;
    }

    let enemyWaiting = 0;
    for (let i = 1; i <= MAX_PLAYERS; i += 1) {
      const key = getEnemyKey(i);
      const pos = getPosition("enemy", key);
      if (!pos.inBoard) {
        enemyBench.appendChild(createPiece({ team: "enemy", key, number: i, name: "", onBoard: false }));
        enemyWaiting += 1;
      }
    }
    if (enemyWaiting === 0) {
      enemyBench.innerHTML = `<div class="empty-note">상대편 말판이 모두 코트 위에 있습니다.</div>`;
    }
  }

  function renderBoardPieces() {
    boardLayer.innerHTML = "";

    state.selected.forEach((name, idx) => {
      const pos = getPosition("own", name);
      if (pos.inBoard) {
        const piece = createPiece({ team: "own", key: name, number: idx + 1, name, onBoard: true });
        piece.style.left = `${pos.x}%`;
        piece.style.top = `${pos.y}%`;
        boardLayer.appendChild(piece);
      }
    });

    for (let i = 1; i <= MAX_PLAYERS; i += 1) {
      const key = getEnemyKey(i);
      const pos = getPosition("enemy", key);
      if (pos.inBoard) {
        const piece = createPiece({ team: "enemy", key, number: i, name: "", onBoard: true });
        piece.style.left = `${pos.x}%`;
        piece.style.top = `${pos.y}%`;
        boardLayer.appendChild(piece);
      }
    }
  }

  function renderAll() {
    renderRoster();
    renderBenches();
    renderBoardPieces();
    updatePanelButton();
  }

  function boardPointFromClient(clientX, clientY) {
    const rect = court.getBoundingClientRect();
    if (clientX < rect.left || clientX > rect.right || clientY < rect.top || clientY > rect.bottom) return null;
    return { x: ((clientX - rect.left) / rect.width) * 100, y: ((clientY - rect.top) / rect.height) * 100 };
  }

  function addTrailSegment(prev, next, team) {
    if (!prev || !next) return;
    const dx = next.x - prev.x;
    const dy = next.y - prev.y;
    if (Math.hypot(dx, dy) < 0.22) return;

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", String((prev.x / 100) * COURT_W));
    line.setAttribute("y1", String((prev.y / 100) * COURT_H));
    line.setAttribute("x2", String((next.x / 100) * COURT_W));
    line.setAttribute("y2", String((next.y / 100) * COURT_H));
    line.setAttribute("class", `trail-seg ${team === "enemy" ? "trail-enemy" : "trail-own"}`);
    trailLayer.appendChild(line);
    setTimeout(() => line.remove(), 1000);
  }

  function onPointerDown(event) {
    if (event.pointerType === "mouse" && event.button !== 0) return;
    const piece = event.currentTarget;
    const rect = piece.getBoundingClientRect();
    const disc = piece.querySelector(".disc");
    const discRect = disc.getBoundingClientRect();
    event.preventDefault();

    drag = {
      el: piece,
      team: piece.dataset.team,
      key: piece.dataset.key,
      pointerId: event.pointerId,
      offsetX: event.clientX - rect.left,
      offsetY: event.clientY - rect.top,
      discOffsetX: discRect.left - rect.left + discRect.width / 2,
      discOffsetY: discRect.top - rect.top + discRect.height / 2,
      lastPoint: null
    };

    piece.classList.add("dragging");
    piece.style.left = `${rect.left}px`;
    piece.style.top = `${rect.top}px`;
    piece.style.width = `${rect.width}px`;
    piece.style.height = `${rect.height}px`;
    document.body.appendChild(piece);

    document.addEventListener("pointermove", onPointerMove, { passive: false });
    document.addEventListener("pointerup", onPointerUp, { passive: false });
    document.addEventListener("pointercancel", onPointerCancel, { passive: false });
  }

  function moveDraggedPiece(clientX, clientY) {
    const left = clientX - drag.offsetX;
    const top = clientY - drag.offsetY;
    drag.el.style.left = `${left}px`;
    drag.el.style.top = `${top}px`;
    return { centerX: left + drag.discOffsetX, centerY: top + drag.discOffsetY };
  }

  function onPointerMove(event) {
    if (!drag || event.pointerId !== drag.pointerId) return;
    event.preventDefault();
    const center = moveDraggedPiece(event.clientX, event.clientY);
    const point = boardPointFromClient(center.centerX, center.centerY);
    if (point) {
      addTrailSegment(drag.lastPoint, point, drag.team);
      drag.lastPoint = point;
    } else {
      drag.lastPoint = null;
    }
  }

  function finishDrag(event, cancelled = false) {
    if (!drag || event.pointerId !== drag.pointerId) return;
    event.preventDefault();

    const center = moveDraggedPiece(event.clientX, event.clientY);
    const point = !cancelled ? boardPointFromClient(center.centerX, center.centerY) : null;

    if (point) {
      setPosition(drag.team, drag.key, {
        inBoard: true,
        x: Number(clamp(point.x, 2.2, 97.8).toFixed(3)),
        y: Number(clamp(point.y, 3.2, 96.8).toFixed(3))
      });
    } else {
      setPosition(drag.team, drag.key, { inBoard: false });
    }

    document.removeEventListener("pointermove", onPointerMove);
    document.removeEventListener("pointerup", onPointerUp);
    document.removeEventListener("pointercancel", onPointerCancel);

    const oldEl = drag.el;
    drag = null;
    oldEl.remove();
    renderAll();
  }

  function onPointerUp(event) { finishDrag(event, false); }
  function onPointerCancel(event) { finishDrag(event, true); }

  function fillSelectionToTwelve() {
    const pool = [];
    [...DEFAULT_SELECTED, ...ROSTER].forEach((name) => {
      if (ROSTER.includes(name) && !pool.includes(name)) pool.push(name);
    });
    let changed = false;
    for (const name of pool) {
      if (state.selected.length >= MAX_PLAYERS) break;
      if (!state.selected.includes(name)) {
        state.selected.push(name);
        changed = true;
      }
    }
    return changed;
  }

  function ensureTwelveBeforeMode() {
    if (state.selected.length === 0) {
      state.selected = DEFAULT_SELECTED.slice(0, MAX_PLAYERS);
      return true;
    }
    return fillSelectionToTwelve();
  }

  function applyFormation(ownMap, enemyMap, label) {
    const autoFilled = ensureTwelveBeforeMode();
    state = buildPositionState(state.selected, ownMap, enemyMap);
    saveState();
    renderAll();
    showToast(autoFilled ? `${label} 배치 완료 · 12명 자동 채움` : `${label} 배치 완료`);
  }

  function clearSelection() {
    state.selected = [];
    state.ownPositions = {};
    saveState();
    renderAll();
    showToast("선수 선택을 모두 해제했습니다.");
  }

  function resetPositions() {
    state.ownPositions = {};
    state.enemyPositions = {};
    saveState();
    renderAll();
    showToast("모든 말판을 대기석으로 되돌렸습니다.");
  }

  function setDefaultPlayers() {
    state.selected = DEFAULT_SELECTED.slice(0, MAX_PLAYERS);
    state.ownPositions = {};
    saveState();
    renderAll();
    showToast("기본 12명을 선택했습니다.");
  }

  async function toggleFullscreen() {
    try {
      if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
      else await document.exitFullscreen();
    } catch (err) {
      showToast("브라우저에서 전체화면을 허용하지 않았어요.");
    }
  }

  function togglePanel() {
    app.classList.toggle("panel-collapsed");
    updatePanelButton();
  }

  function updatePanelButton() {
    panelToggleBtn.textContent = app.classList.contains("panel-collapsed") ? "선수선택" : "코트확대";
  }

  document.getElementById("lineupBtn").addEventListener("click", () => applyFormation(LINEUP_OWN, LINEUP_ENEMY, "출전"));
  document.getElementById("attackBtn").addEventListener("click", () => applyFormation(ATTACK_OWN, ATTACK_ENEMY, "공격모드"));
  document.getElementById("defenseBtn").addEventListener("click", () => applyFormation(DEFENSE_OWN, DEFENSE_ENEMY, "수비모드"));
  document.getElementById("defaultBtn").addEventListener("click", setDefaultPlayers);
  document.getElementById("clearBtn").addEventListener("click", clearSelection);
  document.getElementById("resetPosBtn").addEventListener("click", resetPositions);
  document.getElementById("lineupBtnTop").addEventListener("click", () => applyFormation(LINEUP_OWN, LINEUP_ENEMY, "출전"));
  document.getElementById("attackBtnTop").addEventListener("click", () => applyFormation(ATTACK_OWN, ATTACK_ENEMY, "공격모드"));
  document.getElementById("defenseBtnTop").addEventListener("click", () => applyFormation(DEFENSE_OWN, DEFENSE_ENEMY, "수비모드"));
  document.getElementById("fullscreenBtnTop").addEventListener("click", toggleFullscreen);
  panelToggleBtn.addEventListener("click", togglePanel);

  let lastTwoFingerTap = 0;
  court.addEventListener("dblclick", togglePanel);
  court.addEventListener("touchend", () => {
    const now = Date.now();
    if (now - lastTwoFingerTap < 320) {
      togglePanel();
      lastTwoFingerTap = 0;
    } else {
      lastTwoFingerTap = now;
    }
  }, { passive: true });

  renderAll();
})();
</script>
</body>
</html>
